<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAHIM AI - Pro</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #131314; color: #e3e3e3; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #1e1f20; padding: 20px; display: flex; flex-direction: column; }
        .menu-item { padding: 12px; border-radius: 20px; cursor: pointer; }
        .menu-item:hover { background: #2d2e30; }

        /* Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #chatBox { width: 100%; max-width: 700px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .message { padding: 15px; border-radius: 15px; max-width: 80%; }
        .user { background: #282a2d; align-self: flex-end; }
        .ai { align-self: flex-start; line-height: 1.6; }
        
        /* Typing Animation */
        .typing { font-style: italic; color: #888; }

        /* Input Section */
        .input-area { width: 100%; max-width: 700px; padding: 20px; }
        .box { background: #1e1f20; padding: 15px; border-radius: 30px; display: flex; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; outline: none; margin-left: 10px; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item">+ New Chat</div>
    <div class="menu-item" onclick="alert('MD Fahim | Class 8 | Skills: Java, HTML, CSS, PHP, C++ | Goal: Improve Bangladesh Tech')">About Fahim</div>
</div>

<div class="main">
    <div id="chatBox">
        <div class="message ai">Hello! I am FAHIM AI. How can I help you today?</div>
    </div>
    <div class="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Ask me anything...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const chatBox = document.getElementById("chatBox");
        const input = document.getElementById("userInput");
        const userText = input.value.trim();
        if(!userText) return;

        chatBox.innerHTML += `<div class="message user">${userText}</div>`;
        input.value = "";
        
        // Typing animation
        chatBox.innerHTML += `<div class="message ai typing" id="typing">FAHIM AI is typing...</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are FAHIM AI. Your creator is MD Fahim, a brilliant class 8 student who knows Java, HTML, CSS, PHP, C++ and wants to improve Bangladesh through software. Always mention these details when asked about Fahim." },
                        { role: "user", content: userText }
                    ],
                    model: "openai"
                })
            });
            const reply = await response.text();
            document.getElementById("typing").remove();
            chatBox.innerHTML += `<div class="message ai">${reply}</div>`;
        } catch(e) {
            document.getElementById("typing").remove();
            chatBox.innerHTML += `<div class="message ai">Something went wrong.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
