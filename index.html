<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAHIM AI - Live</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #131314; color: #e3e3e3; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #1e1f20; padding: 20px; display: flex; flex-direction: column; }
        .menu-item { padding: 12px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { background: #2d2e30; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #chatBox { width: 100%; max-width: 700px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { padding: 15px; border-radius: 15px; max-width: 80%; }
        .user { background: #282a2d; align-self: flex-end; }
        .ai { align-self: flex-start; line-height: 1.6; }
        .input-area { width: 100%; max-width: 700px; padding: 20px; }
        .box { background: #1e1f20; padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; }
        button { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item" onclick="location.reload()">+ New Chat</div>
    <div class="menu-item" onclick="alert('MD Fahim | Class 8 | Skills: Java, HTML, CSS, PHP, C++ | Mission: Improve BD')">About Fahim</div>
</div>

<div class="main">
    <div id="chatBox"><div class="message ai">Hello! I am FAHIM AI. Click the mic to speak!</div></div>
    <div class="input-area">
        <div class="box">
            <button onclick="startVoice()">🎤</button>
            <input type="text" id="userInput" placeholder="Ask me anything...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // Voice Input Function
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'bn-BD';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById("userInput").value = event.results[0][0].transcript;
            sendMessage();
        };
    }

    async function sendMessage() {
        const chatBox = document.getElementById("chatBox");
        const input = document.getElementById("userInput");
        const userText = input.value.trim();
        if(!userText) return;

        chatBox.innerHTML += `<div class="message user">${userText}</div>`;
        input.value = "";
        
        chatBox.innerHTML += `<div class="message ai" id="typing">Typing...</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are FAHIM AI, created by MD Fahim (Class 8 student, expert in Java, HTML, CSS, PHP, C++). Always be helpful." },
                        { role: "user", content: userText }
                    ],
                    model: "openai"
                })
            });
            const reply = await response.text();
            document.getElementById("typing").remove();
            chatBox.innerHTML += `<div class="message ai">${reply}</div>`;
        } catch(e) {
            document.getElementById("typing").remove();
            chatBox.innerHTML += `<div class="message ai">Error occurred.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
