<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAHIM AI - Advanced</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a1a2e, #16213e, #0f3460); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 95%; max-width: 450px; height: 85vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; animation: fadeIn 0.3s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { background: linear-gradient(135deg, #4e54c8, #8f94fb); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid #00d2ff; }
        
        .input-area { display: flex; padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; outline: none; margin-right: 10px; }
        button { padding: 10px 20px; background: #00d2ff; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-box" id="chatBox">
        <div class="message ai">Hi! I am <b>FAHIM AI</b>. How can I assist you, boss?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const userText = inputField.value.trim();
        
        if (!userText) return;

        chatBox.innerHTML += `<div class="message user">${userText}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const lowerText = userText.toLowerCase();

        // কাস্টম লজিক
        if (lowerText.includes("dad") || lowerText.includes("mom") || lowerText.includes("father") || lowerText.includes("mother")) {
            setTimeout(() => {
                chatBox.innerHTML += `<div class="message ai">MD FAHIM IS MY CREATOR. HE IS 14 YEARS OLD. MY MOM IS COMING SOON!</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
            return;
        }

        if (lowerText.includes("who made you") || lowerText.includes("who created you")) {
            chatBox.innerHTML += `<div class="message ai">I was built by the brilliant <b>MD FAHIM</b>. He's my boss! 😎</div>`;
            return;
        }

        // এআই রেসপন্স
        try {
            chatBox.innerHTML += `<div class="message ai" id="loading">...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are FAHIM AI, created by MD FAHIM. Always act cool, professional, and helpful." },
                        { role: "user", content: userText }
                    ],
                    model: "openai"
                })
            });
            
            const aiReply = await response.text();
            document.getElementById("loading").remove();
            chatBox.innerHTML += `<div class="message ai">${aiReply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (e) {
            document.getElementById("loading").remove();
            chatBox.innerHTML += `<div class="message ai">System error. Please try again!</div>`;
        }
    }
</script>

</body>
    </html>
