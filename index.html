<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAHIM Gemini Clone</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #131314; color: #e3e3e3; }
        
        /* Gemini Sidebar */
        .sidebar { width: 260px; background: #1e1f20; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #333; }
        .sidebar h3 { font-size: 14px; color: #a8c7fa; margin-bottom: 10px; }
        .menu-item { padding: 10px; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .menu-item:hover { background: #2d2e30; }

        /* Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .chat-container { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .message { padding: 15px; border-radius: 12px; max-width: 80%; }
        .user { background: #282a2d; align-self: flex-end; }
        .ai { background: transparent; align-self: flex-start; color: #d3e3fd; line-height: 1.6; }

        /* Input Box */
        .input-box { width: 100%; max-width: 800px; padding: 20px; }
        .input-container { background: #1e1f20; padding: 15px; border-radius: 30px; display: flex; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; margin-left: 10px; }
        button { background: #00d2ff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-item"><h3>+ New Chat</h3></div>
    <div class="menu-item">Recent Chats</div>
    <div class="menu-item" onclick="alert('Class: 8\nSkills: Java, HTML, CSS, PHP, C++\nMission: Improving Bangladesh through Tech')">About Creator</div>
</div>

<div class="main-chat">
    <div class="chat-container" id="chatBox">
        <div class="message ai">Hello! I am your AI. Ask me about Fahim.</div>
    </div>
    <div class="input-box">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Enter a prompt here">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const text = input.value;
        if(!text) return;

        chatBox.innerHTML += `<div class="message user">${text}</div>`;
        input.value = "";

        // Identity check
        const lower = text.toLowerCase();
        let reply = "";
        
        if(lower.includes("who is fahim")) {
            reply = "MD Fahim is a brilliant Class 8 student and my creator. He is an expert in Java, HTML, CSS, PHP, and C++. His goal is to improve Bangladesh through technology!";
        } else {
            // AI logic
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "system", content: "You are a professional assistant created by MD Fahim (a Class 8 student, expert in Java, HTML, CSS, PHP, C++). Be helpful, smart, and friendly." }, { role: "user", content: text }],
                    model: "openai"
                })
            });
            reply = await response.text();
        }
        
        chatBox.innerHTML += `<div class="message ai">${reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
