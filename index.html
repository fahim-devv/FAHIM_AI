<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAHIM AI - Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f0f12; color: white; display: flex; height: 100vh; margin: 0; }
        
        /* Sidebar Style */
        .sidebar { width: 250px; background: #1a1a2e; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #333; }
        .sidebar h2 { color: #00d2ff; font-size: 1.2rem; }
        .nav-link { cursor: pointer; color: #aaa; transition: 0.3s; }
        .nav-link:hover { color: white; }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; }
        .user { background: #4e54c8; align-self: flex-end; }
        .ai { background: #222; align-self: flex-start; border-left: 4px solid #00d2ff; }
        
        .input-area { padding: 20px; background: #1a1a2e; display: flex; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; }
        button { padding: 10px 20px; background: #00d2ff; border: none; border-radius: 8px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>FAHIM AI Menu</h2>
    <div class="nav-link" onclick="alert('I am a Class 8 student, learning coding to improve Bangladesh!')">About Me</div>
    <div class="nav-link" onclick="alert('Skills: HTML, CSS, PHP, Java, C++')">My Skills</div>
    <div class="nav-link">Settings</div>
</div>

<div class="main">
    <div class="chat-box" id="chatBox">
        <div class="message ai">Hello! I am FAHIM AI. I am powered by the genius MD Fahim!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const userText = inputField.value.trim();
        if (!userText) return;

        chatBox.innerHTML += `<div class="message user">${userText}</div>`;
        inputField.value = "";
        
        // System logic for knowing YOU
        const lower = userText.toLowerCase();
        if(lower.includes("who is fahim") || lower.includes("tell me about fahim")) {
            chatBox.innerHTML += `<div class="message ai">MD Fahim is a brilliant student of class 8. He is on a mission to improve Bangladesh with his software skills! He is an expert in HTML, CSS, PHP, Java, and C++. He is also my creator!</div>`;
        } else {
            // AI Response
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "system", content: "You are FAHIM AI. MD Fahim is your creator, he is a class 8 student, an expert in Java, HTML, CSS, PHP, C++ and wants to improve Bangladesh. Always mention this if asked about Fahim." }, { role: "user", content: userText }],
                    model: "openai"
                })
            });
            const reply = await response.text();
            chatBox.innerHTML += `<div class="message ai">${reply}</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
