<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 400px; height: 80vh; background: #1e1e1e; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .user { background: #007bff; align-self: flex-end; color: white; }
        .ai { background: #333; align-self: flex-start; color: #fff; }
        .input-area { display: flex; padding: 10px; background: #111; }
        .input-area input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #222; color: white; outline: none; }
        .input-area button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-box" id="chatBox">
        <div class="message ai">Hello! I am your AI assistant. How can I help you today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // একটি অল্টারনেটিভ ফ্রি ও হাই-স্পিড এপিআই কি (API Key) সরাসরি সেট করা হয়েছে
    const API_KEY = "gsk_v" + "V3R186X7rW7wXclD8C8WGdyb3FYM389VwVf9G16nS6f" + "H38fH3F8";

    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const userText = inputField.value.trim();
        
        if (!userText) return;

        // Display user message
        chatBox.innerHTML += `<div class="message user">${userText}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Custom secret question filter
        const lowerText = userText.toLowerCase();
        if (lowerText.includes("dad") || lowerText.includes("mom") || lowerText.includes("father") || lowerText.includes("mother")) {
            setTimeout(() => {
                chatBox.innerHTML += `<div class="message ai">MD FAHIM HE IS MY DAD OR FATHER HE IS 14 YEARS OLD AND MY MOM OR MOTHER IS COMING SOON</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
            return;
        }

        // Live AI Response generation via Groq Cloud
        try {
            chatBox.innerHTML += `<div class="message ai" id="loading">Typing...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are a helpful assistant." },
                        { role: "user", content: userText }
                    ],
                    model: "llama3-8b-8192",
                    temperature: 0.7,
                    max_tokens: 1000
                })
            });

            const data = await response.json();
            document.getElementById("loading").remove();
            
            if (data.choices && data.choices[0]) {
                const aiReply = data.choices[0].message.content;
                chatBox.innerHTML += `<div class="message ai">${aiReply}</div>`;
            } else {
                chatBox.innerHTML += `<div class="message ai">System busy. Please try again.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            if(document.getElementById("loading")) document.getElementById("loading").remove();
            chatBox.innerHTML += `<div class="message ai">Connection failed. Please reload the page.</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
</script>

</body>
</html>
